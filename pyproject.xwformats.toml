# Source size (src/*): ~160.1 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwformats"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwformats==0.9.0.34 - provides 'import xwformats' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "serialization",
    "parquet",
    "avro",
    "hdf5",
    "netcdf",
    "protobuf",
    "thrift",
    "scientific",
    "enterprise",
    "formats",
    "exonware",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "exonware-xwformats==0.9.0.34",
]
authors = [
    { name = "Eng. Muhammad AlShehri", email = "connect@exonware.com" },
]

[project.license]
text = "Apache-2.0"

[project.optional-dependencies]
# First-party XW libs composed by this package (excludes exonware-xwsystem==0.9.0.37; see lazy/full).
xw = [
    "exonware-xwformats[xw]==0.9.0.34",
]
lazy = [
    "exonware-xwformats[lazy]==0.9.0.34",
]
full = [
    "exonware-xwformats[full]==0.9.0.34",
]
dev = [
    "exonware-xwformats[dev]==0.9.0.34",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwformats"
Documentation = "https://github.com/exonware/xwformats#readme"

[tool.hatch.version]
path = "src/exonware/xwformats/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwformats_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
