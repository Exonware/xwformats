
# Source size (src/*): ~191.0 KB
[build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"

[project]
  name = "exonware-xwformats"
  dynamic = ["version"]
  description = "Enterprise serialization formats for xwsystem - Parquet, Avro, HDF5, NetCDF, and 14 more heavyweight formats"
  readme = "README.md"
  requires-python = ">=3.12"
  keywords = []
  classifiers = []
  dependencies = []
  exonware-xwsystem = "2758230 ; 2.63 MB"
  authors = []
  "{ name" = "eXonware Backend Team"

  [project.license]
    text = "MIT"

  [project.optional-dependencies]
    lazy = []
    exonware-xwlazy = "349706 ; 0.33 MB"
    "exonware-xwsystem[lazy]" = "3103784 ; 2.96 MB"
    dev = []
    "black>" = "23.0.0\",  # file-size=3914855 ; 3.73 MB"
