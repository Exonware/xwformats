    "pytest-cov>" = "4.0.0\",  # file-size=71639 ; 0.07 MB"
    full = ["pyarrow>=8.0.0", "numpy>=1.20.0", "cloudpickle", "thrift>=0.15.0", "pyorc>=0.6.0", "pycapnp>=1.1.0", "flatbuffers>=2.0.0", "pandas>=1.3.0", "pytz", "numexpr", "bottleneck", "lmdb>=1.4.0", "attrs2bin", "dill", "pypostcard", "py-ubjson>=0.16.0", "h5py>=3.8.0", "zarr>=2.15.0", "pcodec", "fsspec", "isal", "python-snappy", "lz4", "netCDF4>=1.6.0", "scipy>=1.7.0", "cython", "charset-normalizer", "threadpoolctl", "ron", "tomli", "substrait"]
    aiofiles = "81991 ; 0.08 MB"
    attrs = "440438 ; 0.42 MB"
