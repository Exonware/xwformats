[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -x
asyncio_mode = auto

markers =
    xwformats_core: Core functionality and integration tests
    xwformats_unit: Unit tests for individual components
    xwformats_integration: Integration tests across modules
    xwformats_advance: Advance quality tests (v1.0.0+)
    xwformats_security: Security excellence tests (Priority #1)
    xwformats_usability: Usability excellence tests (Priority #2)
    xwformats_maintainability: Maintainability excellence tests (Priority #3)
    xwformats_performance: Performance excellence tests (Priority #4)
    xwformats_extensibility: Extensibility excellence tests (Priority #5)

